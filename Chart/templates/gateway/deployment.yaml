apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels: #Labels-для селекции и группировки
        app: gateway
    spec:
      containers:
      - name: gateway
        image: {{ .Values.gateway.image }}
        imagePullPolicy: Never
        ports:
        - containerPort: {{ .Values.gateway.port }}