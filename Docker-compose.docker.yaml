services:
  kafka:
    image: confluentinc/cp-kafka
    container_name: kafka
    ports:
        - 9092:9092
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093    
      KAFKA_LISTENERS:  CONTROLLER://0.0.0.0:9093, EXTERNAL://0.0.0.0:9092, INTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: CONTROLLER://kafka:9093, EXTERNAL://localhost:9092, INTERNAL://kafka:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT, INTERNAL:PLAINTEXT, EXTERNAL:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
    - kafka_data:/var/lib/kafka/data
      
  kafka-ui:
      image: provectuslabs/kafka-ui
      container_name: kafka_ui
      ports:
        - 8080:8080
      restart: always
      environment:
        - KAFKA_CLUSTERS_0_NAME=local
        - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9094
      depends_on:
      - kafka

  postgresql:
    container_name: "postgres"
    image: postgres
    restart: unless-stopped
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: postgres
      POSTGRES_DB: Tasks
    
  

volumes:
  postgres_data:
  kafka_data: